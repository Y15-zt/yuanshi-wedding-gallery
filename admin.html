<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图册管理后台</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background:#f0f2f5; color:#333; }
.login-wrap { display:flex; align-items:center; justify-content:center; height:100vh; }
.login-box { background:#fff; padding:40px 50px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.08); width:360px; }
.login-box h2 { text-align:center; margin-bottom:30px; font-weight:400; font-size:22px; letter-spacing:2px; }
.login-box input { width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:6px; font-size:14px; margin-bottom:16px; outline:none; }
.login-box input:focus { border-color:#333; }
.login-box button { width:100%; padding:12px; background:#333; color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer; }
.login-box button:hover { background:#000; }
.login-box .hint { text-align:center; font-size:12px; color:#999; margin-top:12px; }
.panel { display:none; height:100vh; overflow:hidden; }
.panel.active { display:flex; }
.sidebar { width:240px; background:#fff; border-right:1px solid #e0e0e0; display:flex; flex-direction:column; }
.sidebar-head { padding:20px; border-bottom:1px solid #eee; }
.sidebar-head h3 { font-size:16px; font-weight:500; }
.sidebar-head p { font-size:12px; color:#999; margin-top:4px; }
.folder-list { flex:1; overflow-y:auto; padding:10px; }
.folder-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-radius:6px; cursor:pointer; font-size:14px; margin-bottom:2px; }
.folder-item:hover { background:#f5f5f5; }
.folder-item.active { background:#333; color:#fff; }
.folder-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.folder-item .count { font-size:12px; opacity:.6; margin-left:8px; }
.folder-item { position:relative; }
.folder-item .folder-actions { display:none !important; }
.folder-item:hover .folder-actions { display:flex !important; }
.sidebar-foot { padding:12px; border-top:1px solid #eee; }
.btn { padding:8px 14px; border:1px solid #ddd; background:#fff; border-radius:6px; cursor:pointer; font-size:13px; }
.btn:hover { border-color:#333; }
.btn-primary { background:#333; color:#fff; border-color:#333; }
.btn-primary:hover { background:#000; }
.btn-danger { color:#d32f2f; border-color:#d32f2f; }
.btn-danger:hover { background:#d32f2f; color:#fff; }
.main { flex:1; overflow-y:auto; padding:24px 30px; }
.main-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.main-head h2 { font-size:18px; font-weight:400; }
.main-actions { display:flex; gap:10px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:20px; }
.add-card { border:2px dashed #ccc; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; height:280px; cursor:pointer; color:#999; }
.add-card:hover { border-color:#333; color:#333; }
.add-card .plus { font-size:40px; margin-bottom:8px; }
.photo-card { background:transparent; border-radius:8px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.06); position:relative; }
.photo-card .img-wrap { width:100%; height:280px; overflow:hidden; position:relative; cursor:pointer; background:#fff; }
.photo-card img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-card .info { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.5); color:#fff; height:16px; padding:0; overflow:hidden; z-index:2; }
.photo-card .title { font-size:11px; font-weight:500; line-height:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:text; padding:0 4px; color:#fff; }
.photo-card .title:hover { background:rgba(255,255,255,0.2); }
.photo-card .desc { display:none; }
.photo-card .meta { display:none; }
.photo-card .overlay { position:absolute; top:6px; right:6px; display:none; }
.photo-card:hover .overlay { display:flex; gap:4px; }
.photo-card .overlay button { background:rgba(0,0,0,0.6); color:#fff; border:none; border-radius:4px; padding:4px 8px; font-size:12px; cursor:pointer; }
.empty { text-align:center; padding:60px; color:#999; }
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:#fff; border-radius:12px; width:520px; max-width:90%; max-height:90vh; overflow:hidden; display:flex; flex-direction:column; }
.modal-head { padding:16px 20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }
.modal-head h3 { font-size:16px; font-weight:500; }
.modal-head .close { font-size:24px; cursor:pointer; color:#999; }
.modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
.modal-body .form-row { margin-bottom:6px; }
.modal-body label { display:block; font-size:12px; color:#666; margin-bottom:3px; }
.modal-body input, .modal-body textarea, .modal-body select { width:100%; padding:6px 8px; border:1px solid #ddd; border-radius:6px; font-size:13px; outline:none; }
.modal-body textarea { min-height:40px; resize:vertical; }
.modal-foot { padding:12px 20px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:10px; }
.upload-area { border:2px dashed #ccc; border-radius:8px; padding:40px; text-align:center; color:#999; cursor:pointer; margin-bottom:16px; }
.upload-area:hover { border-color:#333; color:#333; }
.upload-area.dragover { border-color:#333; background:#f9f9f9; }
.upload-preview { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
.upload-preview-item { width:80px; height:80px; border-radius:4px; overflow:hidden; position:relative; background:#fff; }
.upload-preview-item img { width:100%; height:100%; object-fit:cover; }
.upload-preview-item .badge { position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.6); color:#fff; font-size:10px; padding:2px 4px; border-radius:3px; }
.upload-preview-item .badge.ok { background:rgba(46,125,50,0.8); }
.upload-preview-item .badge.err { background:rgba(211,47,47,0.8); }
.progress-bar { height:4px; background:#eee; border-radius:2px; margin-top:10px; overflow:hidden; }
.progress-bar-fill { height:100%; background:#333; width:0%; transition:width .3s; }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 24px; border-radius:20px; font-size:13px; z-index:2000; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }
.export-preview { max-height:300px; overflow-y:auto; border:1px solid #eee; border-radius:6px; padding:12px; font-size:12px; background:#f9f9f9; white-space:pre-wrap; word-break:break-all; }
.lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:3000; align-items:center; justify-content:center; }
.lightbox.active { display:flex; }
.lightbox img { max-width:90%; max-height:90%; object-fit:contain; }
.lightbox-close { position:absolute; top:20px; right:30px; color:#fff; font-size:36px; cursor:pointer; opacity:.7; }
.lightbox-close:hover { opacity:1; }
.lightbox-nav { position:absolute; top:50%; transform:translateY(-50%); color:#fff; font-size:40px; cursor:pointer; opacity:.5; padding:20px; user-select:none; }
.lightbox-nav:hover { opacity:1; }
.lightbox-prev { left:10px; }
.lightbox-next { right:10px; }
.title-edit { width:100%; font-size:14px; padding:2px 4px; border:1px solid #333; border-radius:3px; outline:none; background:#fff; }
.pos-editor { width:100%; height:200px; border:1px solid #e0e0e0; border-radius:6px; overflow:hidden; position:relative; cursor:grab; background:#fff; margin-bottom:6px; }
.pos-editor:active { cursor:grabbing; }
.pos-editor img { width:100%; height:100%; object-fit:cover; user-select:none; pointer-events:none; }
.pos-editor-hint { font-size:11px; color:#999; text-align:center; margin-bottom:4px; }
.pos-editor-value { font-size:12px; color:#666; text-align:center; margin-bottom:12px; }
.compact-label { font-size:12px; margin-bottom:4px; }
.compact-input { padding:6px 10px; font-size:13px; }
.compact-textarea { padding:6px 10px; font-size:13px; min-height:50px; }
.mobile-warning { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:9999; align-items:center; justify-content:center; flex-direction:column; padding:20px; text-align:center; }
.mobile-warning.active { display:flex; }
.mobile-warning h2 { font-size:20px; margin-bottom:12px; font-weight:400; }
.mobile-warning p { color:#666; font-size:14px; margin-bottom:20px; }
.mobile-warning button { padding:10px 20px; background:#333; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:14px; }
</style>
</head>
<body>

<div class="mobile-warning" id="mobileWarning">
  <h2>📱 管理后台</h2>
  <p>照片上传、分类管理、焦点调整等操作需要较大屏幕空间。<br>建议在电脑端使用管理后台，获得最佳体验。</p>
  <button onclick="document.getElementById('mobileWarning').classList.remove('active')">仍要继续</button>
</div>

<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>管理后台登录</h2>
    <input type="password" id="pwdInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <div class="hint">默认密码：admin123</div>
  </div>
</div>

<div class="panel" id="panel">
  <div class="sidebar">
    <div class="sidebar-head">
      <h3>图册分类</h3>
      <p id="folderCount">0 个分类</p>
    </div>
    <div class="folder-list" id="folderList"></div>
    <div class="sidebar-foot">
      <button class="btn" style="width:100%;" onclick="showAddFolder()">+ 新建分类</button>
    </div>
  </div>
  <div class="main">
    <div class="main-head">
      <h2 id="currentTitle">全部照片</h2>
      <div class="main-actions">
        <button class="btn btn-primary" onclick="showUpload()">上传照片</button>
        <button class="btn" onclick="showExport()">导出分享</button>
        <button class="btn" onclick="doLogout()">退出</button>
      </div>
    </div>
    <div class="grid" id="photoGrid">
      <div class="add-card" onclick="showUpload()"><div class="plus">+</div><div class="txt">上传照片</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <div class="modal-head"><h3>上传照片</h3><div class="close" onclick="hideUpload()">&times;</div></div>
    <div class="modal-body">
      <div class="form-row"><label>选择分类</label><select id="uploadFolder"></select></div>
      <div class="form-row"><label>图片焦点位置</label>
        <select id="uploadPosition">
          <option value="center">居中（默认）</option>
          <option value="top">顶部（显示头部）</option>
          <option value="bottom">底部（显示脚部）</option>
        </select>
      </div>
      <div class="form-row">
        <label>选择图片（支持多选）</label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <div>点击或拖拽图片到此处</div>
          <div style="font-size:12px;color:#bbb;margin-top:4px;">超过 2MB 自动压缩，支持 JPG/PNG/GIF</div>
        </div>
        <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/gif,image/webp,image/bmp" style="display:none;" onchange="handleFiles(this.files)">
        <div class="upload-preview" id="uploadPreview"></div>
        <div class="progress-bar" id="progressBar" style="display:none;"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div id="uploadStatus" style="font-size:12px;color:#999;margin-top:8px;"></div>
      </div>
      <div class="form-row"><label>统一标题（可选）</label><input type="text" id="uploadTitle" placeholder="例如：婚纱外景"></div>
      <div class="form-row"><label>统一描述（可选）</label><textarea id="uploadDesc" placeholder="例如：2024年春季拍摄"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="hideUpload()">取消</button>
      <button class="btn btn-primary" onclick="confirmUpload()">确认上传</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-head"><h3>编辑照片</h3><div class="close" onclick="hideEdit()">&times;</div></div>
    <div class="modal-body">
      <div class="form-row">
        <label class="compact-label">标题</label>
        <input type="text" class="compact-input" id="editTitle">
      </div>
      <div class="form-row">
        <label class="compact-label">描述</label>
        <textarea class="compact-textarea" id="editDesc"></textarea>
      </div>
      <div class="form-row">
        <label class="compact-label">分类</label>
        <select id="editFolder"></select>
      </div>
      <div class="form-row">
        <label class="compact-label">图片显示位置（拖动调整）</label>
        <div class="pos-editor" id="posEditor">
          <img id="posEditorImg" src="" alt="">
        </div>
        <div class="pos-editor-hint">拖动图片调整显示位置</div>
        <div class="pos-editor-value" id="posEditorValue">居中</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="hideEdit()">取消</button>
      <button class="btn btn-primary" onclick="confirmEdit()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="folderModal">
  <div class="modal" style="width:400px;">
    <div class="modal-head"><h3 id="folderModalTitle">新建分类</h3><div class="close" onclick="hideFolderModal()">&times;</div></div>
    <div class="modal-body">
      <div class="form-row"><label>分类名称</label><input type="text" id="folderNameInput" placeholder="例如：外景婚纱"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="hideFolderModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmFolder()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="exportModal">
  <div class="modal" style="width:600px;">
    <div class="modal-head"><h3>导出分享</h3><div class="close" onclick="hideExport()">&times;</div></div>
    <div class="modal-body">
      <div class="form-row"><label>选择导出分类</label><select id="exportFolder"><option value="all">全部</option></select></div>
      <div class="form-row"><label>导出文件名称</label><input type="text" id="exportName" value="我的图册分享.html"></div>
      <div class="form-row"><label>预览（包含 <span id="exportCount">0</span> 张照片）</label><div class="export-preview" id="exportPreview">点击预览生成内容...</div></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="hideExport()">取消</button>
      <button class="btn" onclick="previewExport()">预览</button>
      <button class="btn btn-primary" onclick="confirmExport()">下载文件</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLb(event)">
  <div class="lightbox-close" onclick="closeLbBtn(event)">&times;</div>
  <div class="lightbox-nav lightbox-prev" onclick="prevLb(event)">&#10094;</div>
  <img id="lb-img" src="" alt="">
  <div class="lightbox-nav lightbox-next" onclick="nextLb(event)">&#10095;</div>
</div>

<div class="toast" id="toast"></div>

<script>
// 自动清理旧数据库，避免版本冲突
indexedDB.deleteDatabase('GalleryDB');

const DB_NAME = 'GalleryDB_v3';
const DB_VERSION = 3;
const MAX_SIZE = 2 * 1024 * 1024;
const MAX_WIDTH = 1920;
const MAX_WIDTH_THUMB = 400;
let db = null;
let currentFolder = 'all';
let photos = [];
let folders = [];
let uploadQueue = [];
let uploadDone = 0;
let uploadTotal = 0;
let editingId = null;
let folderModalMode = 'add';
let editingFolderOld = null;
let lbIndex = 0;
let lbPhotos = [];
let posEditorDragging = false;
let posEditorStartX = 0;
let posEditorStartY = 0;
let posEditorStartPercentX = 50;
let posEditorStartPercentY = 50;
let posEditorCurrentX = 50;
let posEditorCurrentY = 50;
const defaultPassword = 'admin123';

function init() {
  if (localStorage.getItem('gallery_admin_logged') === '1') {
    showPanel();
    openDB().then(loadData).catch(function(err){ console.error(err); toast('数据库初始化失败'); });
  }
}

function openDB() {
  return new Promise(function(resolve, reject) {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = function() { reject(req.error); };
    req.onsuccess = function() { db = req.result; resolve(db); };
    req.onupgradeneeded = function(e) {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('photos')) {
        const store = d.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
        store.createIndex('folder', 'folder', { unique: false });
      }
      if (!d.objectStoreNames.contains('folders')) {
        d.createObjectStore('folders', { keyPath: 'name' });
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
    };
  });
}

function getAll(store) {
  return new Promise(function(resolve, reject) {
    if (!db) return resolve([]);
    const tx = db.transaction(store, 'readonly');
    const s = tx.objectStore(store);
    if (s.getAll) {
      const req = s.getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = function() { reject(req.error); };
    } else {
      const req = s.openCursor();
      const out = [];
      req.onsuccess = function(e) {
        const c = e.target.result;
        if (c) { out.push(c.value); c.continue(); } else { resolve(out); }
      };
      req.onerror = function() { reject(req.error); };
    }
  });
}

function getOne(store, key) {
  return new Promise(function(resolve, reject) {
    if (!db) return resolve(null);
    const tx = db.transaction(store, 'readonly');
    const s = tx.objectStore(store);
    const req = s.get(key);
    req.onsuccess = function() { resolve(req.result || null); };
    req.onerror = function() { reject(req.error); };
  });
}

function put(store, data) {
  return new Promise(function(resolve, reject) {
    if (!db) { reject(new Error('数据库未打开')); return; }
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const req = s.put(data);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

function del(store, key) {
  return new Promise(function(resolve, reject) {
    if (!db) { reject(new Error('数据库未打开')); return; }
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const req = s.delete(key);
    req.onsuccess = function() { resolve(); };
    req.onerror = function() { reject(req.error); };
  });
}

async function loadData() {
  photos = await getAll('photos');
  folders = await getAll('folders');
  renderFolders();
  renderPhotos();
  updateSelects();
}

function updateSelects() {
  const emptyOpt = '<option value="">请先新建分类</option>';
  const opts = folders.length === 0 ? emptyOpt : folders.map(function(f) {
    return '<option value="' + escAttr(f.name) + '">' + escHtml(f.name) + '</option>';
  }).join('');
  document.getElementById('uploadFolder').innerHTML = opts;
  document.getElementById('editFolder').innerHTML = opts;
  document.getElementById('exportFolder').innerHTML = '<option value="all">全部</option>' + opts;
}

function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function escAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function renderFolders() {
  const el = document.getElementById('folderList');
  let html = '';
  const allCount = photos.length;
  html += '<div class="folder-item ' + (currentFolder === 'all' ? 'active' : '') + '" onclick="setFolder(\'all\')">';
  html += '<span class="name">全部</span><span class="count">' + allCount + '</span></div>';
  folders.forEach(function(f) {
    const c = photos.filter(function(p) { return p.folder === f.name; }).length;
    html += '<div class="folder-item ' + (currentFolder === f.name ? 'active' : '') + '" data-name="' + escAttr(f.name) + '">';
    html += '<span class="name" onclick="setFolder(\'' + escJsStr(f.name) + '\')">' + escHtml(f.name) + '</span>';
    html += '<span class="count" onclick="setFolder(\'' + escJsStr(f.name) + '\')">' + c + '</span>';
    html += '<span class="folder-actions" style="display:none;margin-left:6px;gap:4px;">';
    html += '<button onclick="renameFolder(\'' + escJsStr(f.name) + '\',event)" style="background:none;border:none;color:inherit;opacity:.7;cursor:pointer;font-size:12px;padding:0;">重命名</button>';
    html += '<button onclick="deleteFolder(\'' + escJsStr(f.name) + '\',event)" style="background:none;border:none;color:inherit;opacity:.7;cursor:pointer;font-size:12px;padding:0;">删除</button>';
    html += '</span></div>';
  });
  if (folders.length === 0) {
    html += '<div style="padding:10px 14px;color:#999;font-size:12px;">暂无分类<br>点击下方按钮新建</div>';
  }
  el.innerHTML = html;
  document.getElementById('folderCount').textContent = folders.length + ' 个分类';
}

function escJsStr(s) {
  return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}

function setFolder(name) {
  currentFolder = name;
  renderFolders();
  renderPhotos();
  document.getElementById('currentTitle').textContent = name === 'all' ? '全部照片' : name;
}

function getObjPos(position) {
  if (!position) return 'center';
  if (position === 'top') return 'center top';
  if (position === 'bottom') return 'center bottom';

function isSupportedImage(file) {
  if (!file.type) return false;
  const supported = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'image/bmp'];
  return supported.indexOf(file.type.toLowerCase()) !== -1;
}

function handleFiles(files) {
  if (!files || files.length === 0) return;
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const status = document.getElementById('uploadStatus');
  bar.style.display = 'block';
  uploadQueue = [];
  uploadDone = 0;
  uploadTotal = 0;
  let skipped = 0;
  const validFiles = Array.from(files).filter(function(file) {
    if (!isSupportedImage(file)) { skipped++; return false; }
    return true;
  });
  if (validFiles.length > 50) {
    const skippedCount = validFiles.length - 50;
    validFiles.splice(50);
    uploadTotal = 50;
    status.textContent = '一次最多上传 50 张，已跳过 ' + skippedCount + ' 张';
  } else {
    uploadTotal = validFiles.length;
  }
  if (skipped > 0) {
    status.textContent = '跳过了 ' + skipped + ' 个不支持的文件（仅支持 JPG/PNG/GIF/WebP/BMP）';
  }
  if (validFiles.length === 0) {
    fill.style.width = '100%';
    status.textContent = '没有可上传的图片，请检查文件格式';
    return;
  }
  validFiles.forEach(function(file) {
    const reader = new FileReader();
    reader.onerror = function() { uploadDone++; updateProgress(); };
    reader.onload = function(e) {
      compressImage(e.target.result, file.size).then(function(result) {
        uploadQueue.push({ data: result.data, thumb: result.thumb, name: file.name, size: result.size, origSize: file.size });
        uploadDone++;
        updateProgress();
        renderPreview(file.name, result.thumb, result.size, file.size, null);
      }).catch(function(err) {
        console.error(err);
        uploadDone++;
        updateProgress();
        renderPreview(file.name, null, 0, file.size, err.message || '处理失败');
      });
    };
    reader.readAsDataURL(file);
  });
}

function updateProgress() {
  const fill = document.getElementById('progressFill');
  const status = document.getElementById('uploadStatus');
  if (uploadTotal > 0) {
    fill.style.width = Math.round((uploadDone / uploadTotal) * 100) + '%';
    status.textContent = '处理中 ' + uploadDone + ' / ' + uploadTotal;
  }
}

function renderPreview(name, thumb, size, origSize, err) {
  const el = document.getElementById('uploadPreview');
  const div = document.createElement('div');
  div.className = 'upload-preview-item';
  if (err) {
    div.innerHTML = '<div style="width:100%;height:100%;background:#ffebee;display:flex;align-items:center;justify-content:center;font-size:10px;color:#d32f2f;padding:4px;text-align:center;">' + escHtml(err) + '</div>';
  } else {
    const compressed = size < origSize;
    div.innerHTML = '<img src="' + thumb + '"><div class="badge ' + (compressed ? 'ok' : '') + '">' + (compressed ? '已压缩' : '原图') + '</div>';
  }
  el.appendChild(div);
}

function compressImage(dataUrl, fileSize) {
  return new Promise(function(resolve, reject) {
    if (fileSize <= MAX_SIZE) {
      const img = new Image();
      img.onload = function() {
        if (img.width <= MAX_WIDTH) {
          makeThumb(dataUrl, MAX_WIDTH_THUMB).then(function(thumb) {
            resolve({ data: dataUrl, thumb: thumb, size: fileSize });
          }).catch(reject);
        } else {
          doCompress(dataUrl, img.width, img.height, MAX_WIDTH, MAX_WIDTH_THUMB, resolve, reject);
        }
      };
      img.onerror = function() { reject(new Error('图片加载失败，可能是不支持的格式')); };
      img.src = dataUrl;
      return;
    }
    doCompress(dataUrl, null, null, MAX_WIDTH, MAX_WIDTH_THUMB, resolve, reject);
  });
}

function doCompress(dataUrl, w, h, maxW, thumbW, resolve, reject) {
  const img = new Image();
  img.onload = function() {
    try {
      let width = w || img.width;
      let height = h || img.height;
      if (width > maxW) { height = Math.round(height * maxW / width); width = maxW; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      let quality = 0.92;
      let result = canvas.toDataURL('image/jpeg', quality);
      while (result.length > MAX_SIZE * 1.33 && quality > 0.3) {
        quality -= 0.1;
        result = canvas.toDataURL('image/jpeg', quality);
      }
      const size = Math.round(result.length * 0.75);
      makeThumb(result, thumbW).then(function(thumb) {
        resolve({ data: result, thumb: thumb, size: size });
      }).catch(reject);
    } catch (e) {
      reject(e);
    }
  };
  img.onerror = function() { reject(new Error('图片压缩失败')); };
  img.src = dataUrl;
}

function makeThumb(dataUrl, maxWidth) {
  return new Promise(function(resolve, reject) {
    const img = new Image();
    img.onload = function() {
      try {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      } catch (e) {
        reject(e);
      }
    };
    img.onerror = function() { reject(new Error('缩略图生成失败')); };
    img.src = dataUrl;
  });
}

function setupPosEditor(position) {
  let x = 50, y = 50;
  if (position === 'top') { x = 50; y = 0; }
  else if (position === 'bottom') { x = 50; y = 100; }
  else if (position === 'center') { x = 50; y = 50; }
  else if (position && position.indexOf('%') !== -1) {
    const parts = position.split(' ');
    x = parseInt(parts[0]);
    y = parseInt(parts[1]);
  }
  posEditorCurrentX = x;
  posEditorCurrentY = y;
  const img = document.getElementById('posEditorImg');
  img.style.objectPosition = x + '% ' + y + '%';
  updatePosEditorHint();
}

function updatePosEditorHint() {
  const el = document.getElementById('posEditorValue');
  let text = '';
  if (posEditorCurrentY < 20) text = '偏上';
  else if (posEditorCurrentY > 80) text = '偏下';
  else text = '居中';
  if (posEditorCurrentX < 30) text += ' 偏左';
  else if (posEditorCurrentX > 70) text += ' 偏右';
  el.textContent = text + ' (' + posEditorCurrentX + '%, ' + posEditorCurrentY + '%)';
}

const posEditor = document.getElementById('posEditor');
if (posEditor) {
  posEditor.addEventListener('mousedown', function(e) {
    posEditorDragging = true;
    posEditorStartX = e.clientX;
    posEditorStartY = e.clientY;
    posEditorStartPercentX = posEditorCurrentX;
    posEditorStartPercentY = posEditorCurrentY;
    posEditor.style.cursor = 'grabbing';
  });
}

document.addEventListener('mousemove', function(e) {
  if (!posEditorDragging) return;
  const rect = posEditor.getBoundingClientRect();
  const dampening = 0.5;
  const deltaX = ((e.clientX - posEditorStartX) / rect.width) * 100 * dampening;
  const deltaY = ((e.clientY - posEditorStartY) / rect.height) * 100 * dampening;
  let newX = posEditorStartPercentX + deltaX;
  let newY = posEditorStartPercentY + deltaY;
  newX = Math.max(0, Math.min(100, newX));
  newY = Math.max(0, Math.min(100, newY));
  const img = document.getElementById('posEditorImg');
  img.style.objectPosition = newX + '% ' + newY + '%';
  updatePosEditorHint();
});

document.addEventListener('mouseup', function() {
  if (!posEditorDragging) return;
  posEditorDragging = false;
  posEditor.style.cursor = 'grab';
  const img = document.getElementById('posEditorImg');
  const pos = img.style.objectPosition;
  if (pos) {
    const parts = pos.split(' ');
    posEditorCurrentX = parseInt(parts[0]);
    posEditorCurrentY = parseInt(parts[1]);
  }
});

    '.folder-tab.active{background:#333;color:#fff;border-color:#333}'
  ];

  const jsLines = [
    'function gp(p){if(p==="top")return"50% 0%";if(p==="bottom")return"50% 100%";if(p==="center")return"50% 50%";return p||"50% 50%";}',
    'var photos=[' + items + '];',
    'var folders=[' + allFolders.map(f => '"' + escJsStr(f) + '"').join(',') + '];',
    'var currentFolder="all";',
    'var ci=0;',
    'var displayPhotos=[];',
    'function escJs(s){return(s||"").replace(/\\\\/g,"\\\\\\\\").replace(/\'/g,"\\\\'").replace(/"/g,"\\\\\\"").replace(/\\n/g,"\\\\n").replace(/\\r/g,"\\\\r");}',
    'function renderTabs(){var t=document.getElementById("tabs");var h="<div class=\\"folder-tab "+(currentFolder==="all"?"active":"")+"\\" onclick=\\"setFolder('all')\\">全部</div>";for(var i=0;i<folders.length;i++){h+="<div class=\\"folder-tab "+(currentFolder===folders[i]?"active":"")+"\\" onclick=\\"setFolder('"+escJs(folders[i])+"')\\">"+folders[i]+"</div>"}t.innerHTML=h;}',
    'function setFolder(name){currentFolder=name;renderTabs();render();}',
    'function render(){',
    'var g=document.getElementById("grid");',
    'displayPhotos=currentFolder==="all"?photos:photos.filter(function(p){return p.folder===currentFolder;});',
    'if(!displayPhotos.length){g.innerHTML=\'<div class="empty"><h2>\u6682\u65e0\u56fe\u7247</h2></div>\';return}',
    'var h="";',
    'for(var i=0;i<displayPhotos.length;i++){',
    'var p=displayPhotos[i];',
    'var ps=gp(p.position);',
    'h+="<div class=\\"card\\" onclick=\\"openLb("+i+")\\"><img class=\\"card-img\\" src=\\""+(p.thumb||p.data)+"\\" alt=\\"\\" style=\\"object-position:"+ps+"\\"><div class=\\"card-info\\"><div class=\\"card-title\\">"+(p.title||"\u672a\u547d\u540d")+"</div><div class=\\"card-desc\\">"+(p.desc||"")+"</div></div></div>"',
    '}',
    'g.innerHTML=h;',
    '}',
    'function openLb(i){ci=i;document.getElementById("lb-img").src=displayPhotos[i].data;document.getElementById("lightbox").classList.add("active");document.body.style.overflow="hidden";}'
  ];
  jsLines.push('function closeLb(e){if(e.target.id==="lightbox")closeLbBtn(e)}');
  jsLines.push('function closeLbBtn(e){e&&e.stopPropagation();document.getElementById("lightbox").classList.remove("active");document.body.style.overflow="";}');
  jsLines.push('function prev(e){e.stopPropagation();if(ci>0)openLb(ci-1)}');
  jsLines.push('function next(e){e.stopPropagation();if(ci<displayPhotos.length-1)openLb(ci+1)}');
  jsLines.push('document.addEventListener("keydown",function(e){');
  jsLines.push('var lb=document.getElementById("lightbox");');
  jsLines.push('if(!lb.classList.contains("active"))return;');
  jsLines.push('if(e.key==="Escape")closeLbBtn();');
  jsLines.push('if(e.key==="ArrowLeft")prev({stopPropagation:function(){}});');
  jsLines.push('if(e.key==="ArrowRight")next({stopPropagation:function(){}});');
  jsLines.push('});');
  jsLines.push('render();');
  jsLines.push('renderTabs();');

  const out = [
    '<!DOCTYPE html>',
    '<html lang="zh-CN">',
    '<head>',
    '<meta charset="UTF-8">',
    '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
    '<title>' + escHtml(title) + '</title>',
    '<style>' + cssLines.join('') + '</style>',
    '</head>',
    '<body>',
    '<div class="header"><h1>元世创物 \u5a5a\u7eb1\u5199\u771f</h1><p>\u56fe\u518c\u5206\u4eab</p></div>',
    '<div class="container">',
    '<div class="folder-tabs" id="tabs"></div>',
    '<div class="grid" id="grid"></div></div>',
    '<div class="lightbox" id="lightbox" onclick="closeLb(event)">',
    '<div class="lightbox-close" onclick="closeLbBtn(event)">&times;</div>',
    '<div class="lightbox-nav lightbox-prev" onclick="prev(event)">&#10094;</div>',
    '<img id="lb-img" src="" alt="">',
    '<div class="lightbox-nav lightbox-next" onclick="next(event)">&#10095;</div>',
    '</div>',
    '<div class="footer">\u56fe\u518c\u5206\u4eab</div>',
    '<script>',
    jsLines.join('\n'),
    '</' + 'script>',
    '</body>',
    '</html>'
  ];

  return out.join('\n');
}

(function() {
  const uploadArea = document.getElementById('uploadArea');
  if (uploadArea) {
    uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('dragover'); });
    uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
  }
})();

(function() {
  if (window.innerWidth < 768) {
    document.getElementById('mobileWarning').classList.add('active');
  }
})();

init();
</script>
</body>
</html>
